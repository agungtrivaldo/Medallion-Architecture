version: '3.8'

services:
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "10.8.0.1:9000:9000"
      - "10.8.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: admin123
      MINIO_ROOT_PASSWORD: admin123
    command: server /data --console-address ":9001"

  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hivepassword
      POSTGRES_DB: metastore
    ports:
      - "10.8.0.1:5432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d

  postgres_oltp:
    image: postgres:13
    container_name: postgres_oltp
    environment:
      POSTGRES_USER: oltp
      POSTGRES_PASSWORD: oltppass
      POSTGRES_DB: oltp
    ports:
      - "10.8.0.1:5433:5432"

  hive-metastore:
    image: apache/hive:4.0.0
    container_name: hive-metastore
    depends_on:
      - postgres
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hivepassword
    ports:
      - "10.8.0.1:9083:9083"
    volumes:
      - ./postgresql-42.7.6.jar:/opt/hive/lib/postgresql-42.7.6.jar
      - ./hive-config/hive-site.xml:/opt/hive/conf/hive-site.xml

  trino:
    image: trinodb/trino
    container_name: trino
    ports:
      - "10.8.0.1:8080:8080"
    volumes:
      - ./trino-config:/etc/trino/
      # - ./trino-jars:/usr/lib/trino/plugin/iceberg

  airflow:
    image: apache/airflow:2.9.1
    container_name: airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: 'IDuTBGUhBX87tgM9ez-3bQXk8ciMOJPnRhgSf5c_HIs='
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _PIP_ADDITIONAL_REQUIREMENTS: minio apache-airflow-providers-trino==5.7.0
    depends_on:
      - postgres
    ports:
      - "10.8.0.1:8081:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./airflow_logs:/opt/airflow/logs
      - ./airflow_plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/agung/medalion/Medallion-Architecture/dbt_config:/opt/airflow/dbt_config
    command: >
      bash -c "airflow db migrate &&
              airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com &&
              exec airflow webserver"

  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: airflow-scheduler
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: IDuTBGUhBX87tgM9ez-3bQXk8ciMOJPnRhgSf5c_HIs=
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _PIP_ADDITIONAL_REQUIREMENTS: minio apache-airflow-providers-trino==5.7.0
    volumes:
      - ./dags:/opt/airflow/dags
      - ./airflow_logs:/opt/airflow/logs
      - ./airflow_plugins:/opt/airflow/plugins
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/agung/medalion/Medallion-Architecture/dbt_config:/opt/airflow/dbt_config
    command: airflow scheduler
